
<style>
  :root { --gap: 12px; }
  .wrap { padding: 1rem 0; }
  .header { margin-bottom: 1.5rem; }
  .header h2 { font-size: 18px; font-weight: 500; margin: 0 0 4px; color: var(--color-text-primary); }
  .header p { font-size: 13px; color: var(--color-text-secondary); margin: 0; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .tab { padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); font-size: 13px; cursor: pointer; background: transparent; color: var(--color-text-secondary); transition: all .15s; }
  .tab.active { background: var(--color-background-secondary); border-color: var(--color-border-primary); color: var(--color-text-primary); font-weight: 500; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; display: none; }
  .card.visible { display: block; }
  .day-badge { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 12px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: var(--border-radius-md); font-size: 12px; font-weight: 500; }
  .badge-teal { background: #E1F5EE; color: #085041; }
  .badge-coral { background: #FAECE7; color: #712B13; }
  .badge-amber { background: #FAEEDA; color: #633806; }
  .badge-purple { background: #EEEDFE; color: #3C3489; }
  .badge-blue { background: #E6F1FB; color: #0C447C; }
  .badge-gray { background: #F1EFE8; color: #444441; }
  .badge-green { background: #EAF3DE; color: #27500A; }
  .day-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
  .day-sub { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 1rem; }
  .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em; color: var(--color-text-tertiary); margin: 1rem 0 6px; }
  .drill-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px; }
  .drill-item { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; line-height: 1.5; color: var(--color-text-primary); background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 10px; }
  .drill-icon { width: 18px; height: 18px; min-width: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; margin-top: 1px; }
  .drill-icon.gym { background: #EEEDFE; color: #3C3489; }
  .drill-icon.tennis { background: #E1F5EE; color: #085041; }
  .drill-icon.alc { background: #FAEEDA; color: #633806; }
  .tip { margin-top: 1rem; padding: 8px 12px; border-left: 2px solid #1D9E75; border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; background: #E1F5EE; font-size: 12px; color: #085041; line-height: 1.6; }
  .divider { height: 0.5px; background: var(--color-border-tertiary); margin: 12px 0; }
  .intensity-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .intensity-label { font-size: 12px; color: var(--color-text-secondary); min-width: 60px; }
  .bar-wrap { flex: 1; height: 5px; background: var(--color-background-tertiary); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; }
</style>
<div class="wrap">
  <div class="header">
    <h2>Weekly training plan — Alcaraz style</h2>
    <p>Disesuaikan dengan profil fisikmu · Tennis 1 bulan · Background badminton</p>
  </div>
  <div class="tabs" id="tabs"></div>
  <div id="cards"></div>
</div>
<script>

    ],
    tip: "Alcaraz menggunakan split step SETIAP pukulan lawan. Latih timing-nya: split step tepat saat lawan kontak bola, bukan setelahnya.",

  },
  {
    day: "Selasa", focus: "Core & Rotational Power", badge: "badge-coral", emoji: "🔄",
    gym: [
      { text: "Med ball rotational throw 4x8/side — ini adalah sumber 'venom' dari FH Alcaraz. Eksplosi pinggul dulu, bahu ikut.", icon: "gym" },
      { text: "Cable/band wood-chop diagonal 3x12 — simulasi swing plane forehand dan backhand", icon: "gym" },

    ],
    tennis: [
      { text: "Forehand heavy topspin feed — from basket, 60 bola, fokus brushing up on contact zone, bukan power", icon: "tennis" },
      { text: "On-the-run forehand drill — coach/partner feed alternating left-right wide, kamu recover center setiap pukulan", icon: "alc" },
      { text: "Sliding work (jika ada hard court, fokus controlled push-out) — Alcaraz slide di hard court, bukan hanya clay", icon: "alc" },
      { text: "Bonus: drop shot touch practice 10 min — forehand drop shot dari mid-court, net clearance minimal", icon: "alc" },
    ],
    tip: "Kunci 'venom' Alcaraz: hip rotation mendahului bahu 10-15 ms. Rasakan urutan: kaki → pinggul → bahu → raket. Latih slow motion dulu.",
    gym_intensity: 75, tennis_intensity: 70
  },
  {
    day: "Rabu", focus: "Reaction & Match Play", badge: "badge-blue", emoji: "🎾",
    gym: [
      { text: "Ball-drop reaction drill 3x10 — partner drop bola dari pinggang, kamu sprint dan tangkap sebelum bounce ke-2", icon: "gym" },
      { text: "Cone T-drill 4x — agility benchmark, ukur waktu tiap minggu", icon: "gym" },
      { text: "Juggling 10 min — fine motor + hand-eye coordination (Alcaraz practice ini sejak kecil)", icon: "gym" },
    ],
    tennis: [
      { text: "Match play 2-3 set — main dengan target strategi, bukan hanya menang: coba minimal 3 drop shot per set", icon: "tennis" },
      { text: "Alcaraz signature pattern: Rally → short ball → approach → drop shot or winner. Drill pola ini sadar-sadar.", icon: "alc" },
      { text: "Between points: deliberate reset ritual (bounce bola, breath). Alcaraz selalu punya rhythm antara poin.", icon: "alc" },
    ],
    tip: "Hari ini adalah 'match intelligence day'. Fokus taktik: kapan aggress, kapan sabar. Catat berapa unforced error vs forced error setelah main.",
    gym_intensity: 50, tennis_intensity: 90
  },
  {
    day: "Kamis", focus: "Upper Body & Serve", badge: "badge-purple", emoji: "🏋️",
    gym: [
      { text: "Resistance band internal/external rotation 3x15 — 'shoulder prehab' wajib untuk pemain yang serve keras", icon: "gym" },
      { text: "Pull-up 3x max atau lat pulldown 3x10 — lat engagement penting untuk serve power dan FH finish", icon: "gym" },
      { text: "Push-up + serratus punch 3x12 — scapular stability untuk control raket saat volley dan overhead", icon: "gym" },
      { text: "Wrist flexion/extension dengan dumbbell ringan 2x20 — proteksi wrist dari topspin volume tinggi", icon: "gym" },
    ],
    tennis: [
      { text: "Serve placement drill: T-serve, body serve, wide serve — 20 bola per zone. Alcaraz memiliki all-3-zones command.", icon: "alc" },
      { text: "First serve + serve+1 combo: setelah serve, langsung anticipate response dan hit approach atau FH winner", icon: "alc" },
      { text: "Volley reaction drill — coach feed rapid volleys dari 3m jarak, fokus compact swing bukan full swing", icon: "tennis" },
      { text: "Overhead smash 20x — Alcaraz punya overhead yang mematikan. Fokus shoulder rotation dan contact point tinggi", icon: "tennis" },
    ],
    tip: "Serve Alcaraz: pronation saat contact menghasilkan kick serve-nya. Latih toss sedikit ke kiri (untuk righty) dan brushing up-out pada bola.",
    gym_intensity: 70, tennis_intensity: 75
  },
  {
    day: "Jumat", focus: "Endurance & Baseline Stamina", badge: "badge-amber", emoji: "🔥",
    gym: [
      { text: "MyWhoosh Zone 2, 35-45 menit — HR 130-145. Ini membangun aerobic base untuk rally panjang ala Alcaraz", icon: "gym" },
      { text: "HIIT finisher setelah Zone 2: 6x (20 detik all-out sprint / 40 detik jalan). Simulate 5-set intensity surges.", icon: "gym" },
    ],
    tennis: [
      { text: "Long rally endurance drill — target 20+ shot rally tanpa error, dengan partner atau ball machine. Consistency over power.", icon: "tennis" },
      { text: "Side-to-side baseline drill — coach alternate feed left-right, kamu recover center setiap pukulan. 10 menit non-stop.", icon: "tennis" },
      { text: "Alcaraz stamina test: play 3 tiebreaks back to back tanpa break panjang. Ini simulate tight set pressure.", icon: "alc" },
      { text: "Finish dengan 15 menit shadow footwork — split step, lateral, recovery — sambil jaga HR di Zone 3", icon: "tennis" },
    ],
    tip: "Alcaraz bermain dengan intensitas yang sama di poin ke-1 dan poin ke-100. Endurance bukan hanya fisik — latih mental dengan sengaja jaga focus di rally panjang.",
    gym_intensity: 70, tennis_intensity: 80

  {
    day: "Sabtu", focus: "Tactical & Pressure Play", badge: "badge-green", emoji: "🧠",
    gym: [
      { text: "Mobility circuit 20 menit: hip 90/90, thoracic rotation, ankle dorsiflexion — semua area kritis untuk tennis.", icon: "gym" },
      { text: "Shadow tennis 10 menit: simulasi movement pattern (split step → lateral sprint → recovery) tanpa bola", icon: "gym" },
    ],
    tennis: [
      { text: "Return of serve practice — partner serve, fokus early unit turn dan contact di depan tubuh. 30 menit.", icon: "tennis" },
      { text: "Pressure scenarios: serve at 30-40, approach shot must-make. Alcaraz thrives di pressure points.", icon: "alc" },
      { text: "Alcaraz drop shot drill: set up dengan 2-3 rally ke sudut, lalu drop shot. Deception > power. Wrist loose saat contact.", icon: "alc" },
      { text: "Tie-break practice: setiap poin di tiebreak punya weight lebih. Main dengan partner, focus decision making.", icon: "tennis" },
    ],
    tip: "Alcaraz punya 'big point mindset' — ia lebih aggressive, bukan lebih defensive, di poin kritis. Latih kebiasaan ini sekarang, sebelum menjadi refleks.",
    gym_intensity: 40, tennis_intensity: 85
  },
  {
    day: "Minggu", focus: "Active Recovery", badge: "badge-gray", emoji: "😴",
    gym: [
      { text: "Jalan kaki 30-45 menit outdoor — Zone 1 HR. Mental reset, bukan cardio session.", icon: "gym" },
      { text: "Light yoga atau stretching 20 menit — fokus hip flexor, hamstring, shoulder capsule", icon: "gym" },
      { text: "Foam rolling 10 menit — quads, IT band, thoracic spine", icon: "gym" },
    ],
    tennis: [
      { text: "Tidak ada tennis hari ini. Otot dan sistem saraf perlu 24-48 jam untuk supercompensasi.", icon: "tennis" },
      { text: "Opsional: tonton 1 match Alcaraz. Perhatikan footwork sebelum ia memukul, bukan saat ia memukul.", icon: "alc" },
    ],
    tip: "Recovery bukan kelemahan. Alcaraz memiliki tim yang memastikan ia recover optimal — massage, cold therapy, sleep priority. Tidurmu di 6.5-7 jam sudah bagus, tapi coba targetkan 7.5 jam di hari ini.",
    gym_intensity: 15, tennis_intensity: 0
  },
];

const tabsEl = document.getElementById('tabs');
const cardsEl = document.getElementById('cards');

days.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab' + (i === 0 ? ' active' : '');
  btn.textContent = d.day;
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.card').forEach(c => c.classList.remove('visible'));
    btn.classList.add('active');
    document.getElementById('card-' + i).classList.add('visible');
  };
  tabsEl.appendChild(btn);

  const gymItems = d.gym.map(g => `<li class="drill-item"><div class="drill-icon ${g.icon}">G</div><span>${g.text}</span></li>`).join('');
  const tennisItems = d.tennis.map(t => `<li class="drill-item"><div class="drill-icon ${t.icon}">${t.icon === 'alc' ? 'A' : 'T'}</div><span>${t.text}</span></li>`).join('');

  const gymBar = `<div class="bar-fill" style="width:${d.gym_intensity}%;background:#7F77DD"></div>`;
  const tennisBar = `<div class="bar-fill" style="width:${d.tennis_intensity}%;background:#1D9E75"></div>`;

  const card = document.createElement('div');
  card.className = 'card' + (i === 0 ? ' visible' : '');
  card.id = 'card-' + i;
  card.innerHTML = `
    <div class="day-badge"><span class="badge ${d.badge}">${d.day}</span><span style="font-size:13px;color:var(--color-text-secondary)">${d.emoji} ${d.focus}</span></div>
    <div class="divider"></div>
    <div class="section-label">🏋️ Gym / Physical</div>
    <ul class="drill-list">${gymItems}</ul>
    <div class="section-label" style="margin-top:1.25rem">🎾 Tennis / Skills</div>
    <ul class="drill-list">${tennisItems}</ul>
    <div class="divider"></div>
    <div class="intensity-row"><span class="intensity-label" style="font-size:12px;color:var(--color-text-tertiary)">Gym load</span><div class="bar-wrap">${gymBar}</div><span style="font-size:12px;color:var(--color-text-secondary);min-width:32px;text-align:right">${d.gym_intensity}%</span></div>
    <div class="intensity-row"><span class="intensity-label" style="font-size:12px;color:var(--color-text-tertiary)">Tennis load</span><div class="bar-wrap">${tennisBar}</div><span style="font-size:12px;color:var(--color-text-secondary);min-width:32px;text-align:right">${d.tennis_intensity}%</span></div>
    <div class="tip"><strong>Alcaraz cue:</strong> ${d.tip}</div>
  `;
  cardsEl.appendChild(card);
});
</script>
